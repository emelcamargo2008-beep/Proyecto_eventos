{% extends 'user/base.html' %}

{% block title %}Editar Evento{% endblock %}

{% block content %}
<h2>Editar Evento</h2>

<form action="{{ url_for('events.edit_event', event_id=event.id) }}" method="POST">
    <p>
        Título:<br>
        <input type="text" name="titulo" value="{{ event.titulo }}" required>
    </p>
    <p>
        Descripción:<br>
        <textarea name="descripcion">{{ event.descripcion }}</textarea>
    </p>
    <p>
        Fecha:<br>
        <input type="date" name="fecha" value="{{ event.fecha }}" required>
    </p>
    <p>
        Capacidad:<br>
        <input type="number" name="capacidad" value="{{ event.capacidad }}" required>
    </p>
    <p>
        Categoría:<br>
        <input type="text" name="categoria" value="{{ event.categoria }}" required>
    </p>
    <p>
        <input type="submit" value="Guardar Cambios">
    </p>
</form>

<p><a href="{{ url_for('events.events_list') }}">Cancelar y volver</a></p>

{% endblock %}
