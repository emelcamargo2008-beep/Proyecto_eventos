<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Evento</title>
</head>
<body>

    <h1>Editar Evento</h1>

    <form method="POST">

        <label>Título:</label><br>
        <input type="text" name="titulo" value="{{ evento.titulo }}"><br><br>

        <label>Descripción:</label><br>
        <textarea name="descripcion">{{ evento.descripcion }}</textarea><br><br>

        <label>Fecha:</label><br>
        <input type="date" name="fecha" value="{{ evento.fecha }}"><br><br>

        <label>Capacidad:</label><br>
        <input type="number" name="capacidad" value="{{ evento.capacidad }}"><br><br>

        <label>Categoría:</label><br>
        <input type="text" name="categoria" value="{{ evento.categoria }}"><br><br>

        <button type="submit">Actualizar Evento</button>

    </form>

</body>
</html>
